name: "🦄 Update Quotes Daily"

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update_quotes:
    name: 🚀 Quote Engine
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.git_commit.outputs.changed }}
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        
      - name: 🖥️ System Info
        run: |
          echo "::group::⚙️ Environment Details"
          echo "System: $(uname -a)"
          echo "Python: $(python3 --version)"
          echo "Date: $(date)"
          echo "::endgroup::"
          
          echo -e "\033[36m"
          echo "============================================"
          echo "      ✨ DAILY QUOTES UPDATER v3.0 ✨       "
          echo "============================================"
          echo -e "\033[0m"

      - name: 📦 Install Dependencies
        run: |
          echo "::group::📦 Installing Python Packages"
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            echo "Installing from requirements.txt..."
            pip install -r requirements.txt
          else
            echo "No requirements.txt found"
          fi
          echo "::endgroup::"

      - name: 🐍 Run Extraction Script
        id: run_script
        run: python scripts/update.py
        env:
          PYTHONIOENCODING: utf-8
          MAX_QUOTE_LENGTH: "15"
          USE_NLP: "true"

      - name: 📊 Verify Data Integrity
        if: success()
        run: |
          echo "::group::🔍 Data Inspection"
          if [ -f quotes.csv ]; then
            echo "✅ quotes.csv exists."
            LINE_COUNT=$(wc -l < quotes.csv)
            echo "📄 Total Lines: $LINE_COUNT"
            echo "👀 Head (First 3):"
            head -n 3 quotes.csv
          else
            echo "❌ Fatal: quotes.csv is missing!"
            exit 1
          fi
          echo "::endgroup::"

      - name: 📡 Commit & Push
        id: git_commit
        if: success()
        run: |
          echo "::group::📝 Git Operations"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add quotes.csv
          
          if git diff --staged --quiet; then
            echo "🤔 No changes detected. Skipping commit."
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "📅 [Auto] Quotes Update $(date +'%Y-%m-%d')"
            git push
            echo "🚀 Changes pushed to repository successfully."
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
          echo "::endgroup::"

      - name: 🚨 Error Handler
        if: failure()
        run: |
          echo -e "\033[31m"
          echo "============================================"
          echo "         🚫 WORKFLOW FAILED 🚫              "
          echo "============================================"
          echo "Check the 'Run Extraction Script' step above"
          echo "for detailed python tracebacks."
          echo -e "\033[0m"
